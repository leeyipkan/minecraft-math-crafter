name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - id: 'auth'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: 'projects/529032031015/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-deployer@minecraft-math-crafter.iam.gserviceaccount.com'

      - run: npm ci
      - run: npm run build

      # Uses GOOGLE_APPLICATION_CREDENTIALS from the auth step (Workload Identity).
      - run: npx -y firebase-tools@latest deploy --only hosting --project minecraft-math-crafter --non-interactive
