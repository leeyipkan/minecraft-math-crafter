name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - id: 'auth'
        uses: 'google-github-actions/auth@v1'
        with:
          workload_identity_provider: 'projects/529032031015/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-deployer@minecraft-math-crafter.iam.gserviceaccount.com'

      - run: npm ci
      - run: npm run build
      
      - name: Create firebase.json from Secret
        run: echo "${{ secrets.FIREBASE_JSON_CONTENT }}" > firebase.json
        
      - name: Create .firebaserc from Secret
        run: echo "${{ secrets.FIREBASERC_CONTENT }}" > .firebaserc

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: 'github-actions-deployer@minecraft-math-crafter.iam.gserviceaccount.com'
          projectId: minecraft-math-crafter
